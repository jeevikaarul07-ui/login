<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    background:white;
    width:400px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    color:#8B0000;
    margin-bottom:5px;
}

.subtitle{
    color:#555;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    border-color:#8B0000;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#660000;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:12px;
}

</style>

</head>
<body>

<div class="login-container">

    <img src="college-logo.png" alt="College Logo" class="logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <div class="subtitle">
        Student Login Portal
    </div>

    <form action="https://formspree.io/f/xwvdwjav" method="POST">

        <input
            type="text"
            name="student_id"
            placeholder="Enter Student ID"
            required>

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        © Student Academic Portal
    </div>

</div>

</body>
</html>
